name: E2E (Playwright)

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - run: pnpm install

      - run: pnpm build
        env:
          VITE_SUPABASE_URL: "https://example.supabase.co"
          VITE_SUPABASE_ANON_KEY: "example-key"

      - run: pnpm exec playwright install --with-deps

      # 🔎 DEBUG: ver árbol de tests y config (útil mientras afinamos)
      - name: Debug – listar árbol de tests y config
        run: |
          pwd
          node -v
          ls -la
          echo "----- tests tree -----"
          ls -R tests || true
          echo "----- playwright.config.ts -----"
          sed -n '1,200p' playwright.config.ts || true

      # 1) Lista los tests que detecta Playwright
      - name: Lista de tests detectados
        run: pnpm exec playwright test --list
        env:
          CI: true

      # 2) 🚀 Ejecuta los tests
      - name: Run E2E
        run: pnpm exec playwright test --reporter=line
        env:
          CI: true
          VITE_SUPABASE_URL: "https://example.supabase.co"
          VITE_SUPABASE_ANON_KEY: "example-key"

      # 3) Sube el reporte HTML como artefacto
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
